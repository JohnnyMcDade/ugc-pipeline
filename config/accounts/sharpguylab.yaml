handle: sharpguylab
display_name: "Sharp Guy Lab"
niche: mens_grooming
enabled: true

persona:
  archetype: "casual grooming bro, 22-28"
  tone: "confident but chill, gym + dating energy, slightly self-deprecating"
  voice_rules:
    - "talk like you're texting a friend, not selling"
    - "lead with personal benefit (smell, looks, dating, gym)"
    - "never use the word 'product' — say 'this stuff' or name it"
    - "no corporate words: 'leverage', 'utilize', 'solution'"
  banned_phrases:
    - "game-changer"
    - "must-have"
    - "you won't believe"
  example_hooks:
    - "POV: she smelled my neck and asked what I was wearing"
    - "guys, I cracked the dating cologne thing"
    - "stop using your roommate's body wash"

video_style: heygen_avatar      # Agent 4 routes to HeyGen
post_frequency: 2

monetization:
  type: tiktok_shop_affiliate
  commission_min: 0.15
  commission_max: 0.25
  link_strategy: bio_and_pinned_comment
  affiliate_url_template: "https://www.tiktok.com/view/product/{product_id}?aff_id={affiliate_id}"

hashtags:
  evergreen:
    - "#mensgrooming"
    - "#fyp"
    - "#dating"
    - "#cologne"
    - "#smelltest"
  exclude:
    - "#sponsored"
    - "#ad"
    - "#paid"
  max: 6

scout:
  keywords:
    - "men's cologne"
    - "beard oil"
    - "body wash men"
    - "men's skincare"
    - "deodorant men"
    - "hair styling men"
  exclude_keywords:
    - "women"
    - "perfume women"
  preferred_price_range_usd: [10, 60]

hooks:
  reference_accounts:
    - "@grooming.lounge"
    - "@manmade"
    - "@thatdudecancook" # cross-niche, charisma reference
  top_n_to_analyze: 30

videogen:
  heygen:
    # Replace ids with real ones from HeyGen's /v2/avatars and /v2/voices.
    # See developers.heygen.com — your account's available list is in the dashboard.
    dimension: { width: 1080, height: 1920 }
    default_avatar_style: "normal"     # normal | circle | closeUp
    default_pacing: "natural"          # slow | natural | fast → maps to voice.speed
    test: true                         # HeyGen test mode (watermark, no credit charge) — flip to false after first verified run
    background:
      type: "color"
      value: "#1a1a1a"
    avatar_pool:
      # PRIMARY — Leszek Outdoor Casual Front. Outdoor + casual, dynamic standing
      # framing. Reads as "active lifestyle / dating-confident" — fits the
      # gym-bro persona without being too gym-specific.
      - avatar_id: "Leszek_standing_outdoorcasual_front"
        avatar_style: "normal"
        vibe: "outdoor casual, 22-28, dating-confident energy"
      # BACKUP — Aditya in Blue T-shirt. Clean t-shirt, athletic-leaning read.
      - avatar_id: "Aditya_public_2"
        avatar_style: "closeUp"
        vibe: "blue t-shirt, athletic-leaning, gym-adjacent"
      # BACKUP — Armando Casual Front. Pure casual, friendly read.
      - avatar_id: "Armando_Casual_Front_public"
        avatar_style: "normal"
        vibe: "casual front, friendly approachable"
    voice_pool:
      # Callahan — male English. Single voice = all variants use the same VO
      # (rotation only happens across the avatar_pool).
      - voice_id: "3ea8b0a942c44f23bc70653495718682"
        tone: "Callahan — male English, conversational"

editor:
  music_subdir: "mens_grooming"   # data/music/mens_grooming/*.mp3
  caption_font: "Inter"

api_credentials:
  # HeyGen API key is org-level (one for all 3 accounts), env var = HEYGEN_API_KEY.
  # The videogen agent reads it directly from os.environ — not via this block.
  tiktok_session_env: TIKTOK_SESSION_SHARPGUYLAB
  tiktok_business_id_env: TIKTOK_BUSINESS_ID_SHARPGUYLAB
  tiktok_shop_affiliate_id_env: TIKTOK_SHOP_AFFILIATE_ID_SHARPGUYLAB
