handle: sharpguylab
display_name: "Sharp Guy Lab"
niche: mens_grooming
enabled: true

persona:
  archetype: "casual grooming bro, 22-28"
  tone: "confident but chill, gym + dating energy, slightly self-deprecating"
  voice_rules:
    - "talk like you're texting a friend, not selling"
    - "lead with personal benefit (smell, looks, dating, gym)"
    - "never use the word 'product' — say 'this stuff' or name it"
    - "no corporate words: 'leverage', 'utilize', 'solution'"
  banned_phrases:
    - "game-changer"
    - "must-have"
    - "you won't believe"
  example_hooks:
    - "POV: she smelled my neck and asked what I was wearing"
    - "guys, I cracked the dating cologne thing"
    - "stop using your roommate's body wash"

video_style: heygen_avatar      # Agent 4 routes to HeyGen
post_frequency: 2

monetization:
  type: tiktok_shop_affiliate
  commission_min: 0.15
  commission_max: 0.25
  link_strategy: bio_and_pinned_comment
  affiliate_url_template: "https://www.tiktok.com/view/product/{product_id}?aff_id={affiliate_id}"

hashtags:
  evergreen:
    - "#mensgrooming"
    - "#fyp"
    - "#dating"
    - "#cologne"
    - "#smelltest"
  exclude:
    - "#sponsored"
    - "#ad"
    - "#paid"
  max: 6

scout:
  keywords:
    - "men's cologne"
    - "beard oil"
    - "body wash men"
    - "men's skincare"
    - "deodorant men"
    - "hair styling men"
  exclude_keywords:
    - "women"
    - "perfume women"
  preferred_price_range_usd: [10, 60]

hooks:
  reference_accounts:
    - "@grooming.lounge"
    - "@manmade"
    - "@thatdudecancook" # cross-niche, charisma reference
  top_n_to_analyze: 30

videogen:
  heygen:
    # Replace ids with real ones from HeyGen's /v2/avatars and /v2/voices.
    # See developers.heygen.com — your account's available list is in the dashboard.
    dimension: { width: 1080, height: 1920 }
    default_avatar_style: "normal"     # normal | circle | closeUp
    default_pacing: "natural"          # slow | natural | fast → maps to voice.speed
    test: false                        # set true to bypass credit usage during dev
    background:
      type: "color"
      value: "#1a1a1a"
    avatar_pool:
      - avatar_id: "AVATAR_PLACEHOLDER_SHARPGUY_01"
        avatar_style: "normal"
        vibe: "casual gym-bro, 22-28"
      - avatar_id: "AVATAR_PLACEHOLDER_SHARPGUY_02"
        avatar_style: "closeUp"
        vibe: "confident outdoor, 25-30"
      - avatar_id: "AVATAR_PLACEHOLDER_SHARPGUY_03"
        avatar_style: "normal"
        vibe: "post-workout / locker-room energy"
    voice_pool:
      - voice_id: "VOICE_PLACEHOLDER_warm_us"
        tone: "warm conversational"
      - voice_id: "VOICE_PLACEHOLDER_smooth_us"
        tone: "smooth confident"

editor:
  music_subdir: "mens_grooming"   # data/music/mens_grooming/*.mp3
  caption_font: "Inter"

api_credentials:
  # HeyGen API key is org-level (one for all 3 accounts), env var = HEYGEN_API_KEY.
  # The videogen agent reads it directly from os.environ — not via this block.
  tiktok_session_env: TIKTOK_SESSION_SHARPGUYLAB
  tiktok_business_id_env: TIKTOK_BUSINESS_ID_SHARPGUYLAB
  tiktok_shop_affiliate_id_env: TIKTOK_SHOP_AFFILIATE_ID_SHARPGUYLAB
