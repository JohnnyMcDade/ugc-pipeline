handle: sharpguylab
display_name: "Sharp Guy Lab"
niche: mens_grooming
enabled: true

persona:
  archetype: "casual grooming bro, 22-28"
  tone: "confident but chill, gym + dating energy, slightly self-deprecating"
  voice_rules:
    - "talk like you're texting a friend, not selling"
    - "lead with personal benefit (smell, looks, dating, gym)"
    - "never use the word 'product' — say 'this stuff' or name it"
    - "no corporate words: 'leverage', 'utilize', 'solution'"
  banned_phrases:
    - "game-changer"
    - "must-have"
    - "you won't believe"
  example_hooks:
    - "POV: she smelled my neck and asked what I was wearing"
    - "guys, I cracked the dating cologne thing"
    - "stop using your roommate's body wash"

video_style: arcads_avatar      # Agent 4 routes to Arcads
post_frequency: 2

monetization:
  type: tiktok_shop_affiliate
  commission_min: 0.15
  commission_max: 0.25
  link_strategy: bio_and_pinned_comment
  affiliate_url_template: "https://www.tiktok.com/view/product/{product_id}?aff_id={affiliate_id}"

hashtags:
  evergreen:
    - "#mensgrooming"
    - "#fyp"
    - "#dating"
    - "#cologne"
    - "#smelltest"
  exclude:
    - "#sponsored"
    - "#ad"
    - "#paid"
  max: 6

scout:
  keywords:
    - "men's cologne"
    - "beard oil"
    - "body wash men"
    - "men's skincare"
    - "deodorant men"
    - "hair styling men"
  exclude_keywords:
    - "women"
    - "perfume women"
  preferred_price_range_usd: [10, 60]

hooks:
  reference_accounts:
    - "@grooming.lounge"
    - "@manmade"
    - "@thatdudecancook" # cross-niche, charisma reference
  top_n_to_analyze: 30

videogen:
  arcads:
    aspect_ratio: "9:16"
    output_format: "mp4"
    default_emotion: "confident"
    default_pacing: "natural"
    avatar_pool:
      # Replace ids with real Arcads avatar ids from /v1/avatars endpoint.
      - id: "AVATAR_PLACEHOLDER_001"
        gender: "male"
        age_range: "22-28"
        vibe: "casual gym-bro, bathroom mirror"
        environment: "bathroom"
      - id: "AVATAR_PLACEHOLDER_002"
        gender: "male"
        age_range: "25-30"
        vibe: "confident outdoor, casual fits"
        environment: "outdoor casual"
      - id: "AVATAR_PLACEHOLDER_003"
        gender: "male"
        age_range: "23-27"
        vibe: "gym locker room, post-workout"
        environment: "gym"
    voice_pool:
      - id: "VOICE_PLACEHOLDER_warm_us"
        accent: "US neutral"
        tone: "warm conversational"
      - id: "VOICE_PLACEHOLDER_smooth_us"
        accent: "US neutral"
        tone: "smooth confident"

editor:
  music_subdir: "mens_grooming"   # data/music/mens_grooming/*.mp3
  caption_font: "Inter"

api_credentials:
  arcads_key_env: ARCADS_API_KEY_SHARPGUYLAB
  tiktok_session_env: TIKTOK_SESSION_SHARPGUYLAB
  tiktok_business_id_env: TIKTOK_BUSINESS_ID_SHARPGUYLAB
  tiktok_shop_affiliate_id_env: TIKTOK_SHOP_AFFILIATE_ID_SHARPGUYLAB
