handle: passivepoly
display_name: "Passive Poly"
niche: polymarket_whale_signals
enabled: true

persona:
  archetype: "confident 19yo who built an AI money system"
  tone: "calm-flex, NOT get-rich-quick. 'I built a system, here's what it caught today.'"
  voice_rules:
    - "frame outputs of the system, not promises"
    - "always anchor to a real alert / real result — pulled from backend"
    - "luxury b-roll is contextual, not the focus — the SIGNAL is the focus"
    - "use 'my system' not 'this product'"
    - "when sharing wins, also share losses periodically (proof = trust)"
  banned_phrases:
    - "guaranteed"
    - "easy money"
    - "passive income hack"
    - "get rich"
  example_hooks:
    - "my AI flagged this whale 8 minutes before the move"
    - "I'm 19 and I let a bot watch Polymarket for me"
    - "today's alerts: 3 wins, 1 loss. here's what they caught"

video_style: heygen_avatar         # Agent 4 routes to HeyGen
post_frequency: 2

monetization:
  type: subscription
  product: "PassivePoly — Polymarket AI whale signals"
  pricing_tiers_usd: [9.99, 19.99, 29.99]
  platform: whop
  cta_url: "https://passivepoly.com"
  whop_url: "https://whop.com/passivepoly/"
  cta_strategy: bio_and_on_screen_lower_third
  link_strategy: bio_and_pinned_comment

hashtags:
  evergreen:
    - "#polymarket"
    - "#prediction"
    - "#marketsignals"
    - "#fintech"
    - "#fyp"
  exclude:
    - "#getrichquick"
    - "#crypto"
    - "#sponsored"
  max: 6

# This account is unique — its "trends" come from the live backend, not Creative Center.
scout:
  source: passivepoly_backend
  backend_repo: "JohnnyMcDade/polymarket-bot"
  data_pull:
    daily_alerts: true
    win_loss_last_7d: true
    biggest_whale_move_24h: true
    notable_market_resolution: true
  content_mix:
    whale_alert: 0.25
    luxury_lifestyle: 0.25
    educational: 0.25
    proof_results: 0.25

hooks:
  reference_accounts:
    - "@litquidity"
    - "@polymarketintel"
    - "@cryptobanter"
  top_n_to_analyze: 30

videogen:
  heygen:
    # All 3 accounts use HeyGen now; passivepoly is a talking-head avatar
    # account, not b-roll. The "Arizona / luxury / desert" aesthetic is
    # gone — pick an avatar/voice that embodies the calm-flex 19yo persona
    # instead. Background is dark/neutral so the Discord evidence screenshot
    # the editor composites pops cleanly.
    dimension: { width: 1080, height: 1920 }
    default_avatar_style: "normal"
    default_pacing: "natural"
    test: false
    background:
      type: "color"
      value: "#0d1117"   # near-black, lets a Discord-card overlay read clearly
    avatar_pool:
      # PRIMARY — August Hoodies Front 2. Hoodie + front framing nails the
      # college-genius / calm-flex 19yo read.
      - avatar_id: "August_Hoodies_Front2_public"
        avatar_style: "normal"
        vibe: "hoodie front, calm-flex 19yo, college-genius read"
      # BACKUP — Brandon Sofa Sitting Front. Home-office sitting framing,
      # reads as "kid running it from his bedroom" — dorm/home-office vibe.
      - avatar_id: "Brandon_Sofa_Sitting_Front_public"
        avatar_style: "closeUp"
        vibe: "sofa sitting, home-office calm, direct-to-camera"
      # BACKUP — Armando Casual Front. Slightly older read; use for
      # educational-beat variants where a touch of authority helps.
      - avatar_id: "Armando_Casual_Front_public"
        avatar_style: "normal"
        vibe: "casual front, friendly explainer for educational beats"
    voice_pool:
      - voice_id: "VOICE_PLACEHOLDER_passivepoly_calm"
        tone: "calm, slightly raspy, NOT hype-bro"
      - voice_id: "VOICE_PLACEHOLDER_passivepoly_clear"
        tone: "clear measured young-male"

editor:
  music_subdir: "polymarket_lofi" # data/music/polymarket_lofi/*.mp3 (calm, atmospheric)
  caption_font: "Inter"

api_credentials:
  # HeyGen API key is org-level — env var HEYGEN_API_KEY (read directly).
  tiktok_session_env: TIKTOK_SESSION_PASSIVEPOLY
  tiktok_business_id_env: TIKTOK_BUSINESS_ID_PASSIVEPOLY
  passivepoly_backend_url_env: PASSIVEPOLY_BACKEND_URL
  passivepoly_backend_token_env: PASSIVEPOLY_BACKEND_TOKEN
