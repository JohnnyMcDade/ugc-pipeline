handle: rideupgrades
display_name: "Ride Upgrades"
niche: car_accessories
enabled: true

persona:
  archetype: "car enthusiast, 25-35, mod-shop-floor energy"
  tone: "knowledgeable, gear-headed, 'you NEED this in your car' framing"
  voice_rules:
    - "lead with the problem the upgrade solves"
    - "talk install difficulty in plain terms (5-min job, no tools)"
    - "compare to OEM whenever possible"
    - "use car-guy slang: 'OEM+', 'sleeper', 'JDM', 'daily', 'mod'"
  banned_phrases:
    - "amazing product"
    - "you have to try this"
  example_hooks:
    - "if you daily a Civic and don't have this, you're cooked"
    - "the $20 mod that fixes the worst part of your interior"
    - "I've put this in 3 cars now and I'm done shopping"

video_style: heygen_avatar
post_frequency: 2

monetization:
  type: tiktok_shop_affiliate
  commission_min: 0.12
  commission_max: 0.22
  link_strategy: bio_and_pinned_comment
  affiliate_url_template: "https://www.tiktok.com/view/product/{product_id}?aff_id={affiliate_id}"

hashtags:
  evergreen:
    - "#cars"
    - "#carmods"
    - "#cartok"
    - "#fyp"
    - "#daily"
  exclude:
    - "#enginerebuild"
    - "#sponsored"
    - "#ad"
  max: 6

scout:
  keywords:
    - "car accessories"
    - "car interior upgrade"
    - "wireless carplay adapter"
    - "led light bar"
    - "phone mount car"
    - "car cleaning kit"
    - "dash cam"
    - "ambient lighting car"
  exclude_keywords:
    - "tools professional"
    - "engine rebuild"
  preferred_price_range_usd: [15, 120]

hooks:
  reference_accounts:
    - "@donutmedia"
    - "@thestradman"
    - "@carwizard"
  top_n_to_analyze: 30

videogen:
  heygen:
    dimension: { width: 1080, height: 1920 }
    default_avatar_style: "normal"
    default_pacing: "natural"
    test: false
    background:
      type: "color"
      value: "#0d0d0d"
    avatar_pool:
      # PRIMARY — Byron Jacket Front. Jacket = outerwear / authentic edge,
      # reads "actually works on cars" not "studio host."
      - avatar_id: "Byron_Jacket_Front_public"
        avatar_style: "normal"
        vibe: "jacket / outerwear edge, 26-32, hands-on car-guy energy"
      # BACKUP — Colin Jacket Front. Same wardrobe direction, different actor.
      - avatar_id: "Colin_Jacket_Front_public"
        avatar_style: "closeUp"
        vibe: "jacket front, authentic shop-floor read"
      # BACKUP — Diran Jacket Front. Third jacket option for variety on the
      # variant_index rotation.
      - avatar_id: "Diran_Jacket_Front_public"
        avatar_style: "normal"
        vibe: "jacket front, slightly older mechanic vibe"
    voice_pool:
      # Mature Morgan — male English. (No 'Morgan Relaxing' in the catalog; this
      # is the closest male match — the only Mature Morgan male voice option.)
      - voice_id: "e31e9614d31d4678be3377da14d99d3b"
        tone: "Mature Morgan — male English, measured / authoritative"

editor:
  music_subdir: "car_culture"     # data/music/car_culture/*.mp3
  caption_font: "Inter"

api_credentials:
  # HeyGen API key is org-level — env var HEYGEN_API_KEY (read directly).
  tiktok_session_env: TIKTOK_SESSION_RIDEUPGRADES
  tiktok_business_id_env: TIKTOK_BUSINESS_ID_RIDEUPGRADES
  tiktok_shop_affiliate_id_env: TIKTOK_SHOP_AFFILIATE_ID_RIDEUPGRADES
