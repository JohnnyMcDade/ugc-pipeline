<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>PassivePoly — TikTok Authorization</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #2ea043;
      --green-bright: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    .container {
      max-width: 720px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      color: var(--accent);
      font-weight: 600;
    }
    .ok h1 { color: var(--green-bright); }
    .err h1 { color: var(--red); }
    .lede { color: var(--muted); margin: 0 0 24px 0; }
    .code-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      word-break: break-all;
      margin: 16px 0;
      user-select: all;
      color: var(--text);
    }
    button {
      background: var(--green);
      color: white;
      border: 0;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.15s;
    }
    button:hover { background: var(--green-bright); }
    button.copied { background: var(--accent); }
    details {
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    details summary {
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }
    details summary:hover { color: var(--text); }
    .meta { color: var(--muted); font-size: 13px; margin-top: 24px; }
    code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container" id="root">
    <h1>Working…</h1>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      const errorDesc = params.get('error_description');
      const container = document.querySelector('.container');

      // Tiny escape helper — never trust query-string values in innerHTML.
      function esc(s) {
        const div = document.createElement('div');
        div.textContent = String(s == null ? '' : s);
        return div.innerHTML;
      }

      if (error) {
        container.classList.add('err');
        container.innerHTML = `
          <h1>✗ Authorization failed</h1>
          <p class="lede">TikTok returned an error.</p>
          <p><strong>Error:</strong> ${esc(error)}</p>
          ${errorDesc ? `<p><strong>Description:</strong> ${esc(errorDesc)}</p>` : ''}
          <p class="meta">Go back to your terminal and re-run
            <code>python tiktok_oauth.py &lt;handle&gt;</code>.</p>
          <div class="footer">passivepoly.com · oauth callback</div>
        `;
        return;
      }

      if (!code) {
        container.innerHTML = `
          <h1>No authorization code present</h1>
          <p class="lede">This page expects to be loaded as TikTok's OAuth redirect target.</p>
          <p class="meta">If you reached this page directly, you're on the wrong URL.
            Re-start the flow from the terminal.</p>
          <div class="footer">passivepoly.com · oauth callback</div>
        `;
        return;
      }

      container.classList.add('ok');
      container.innerHTML = `
        <h1>✓ Authorization received</h1>
        <p class="lede">Copy the code below and paste it into the terminal running
          <code>tiktok_oauth.py</code>.</p>

        <div class="code-box" id="code">${esc(code)}</div>
        <button id="copy">Copy code</button>

        <details>
          <summary>What's next?</summary>
          <p>Switch back to your terminal. The script is waiting on a prompt:
          <code>code →</code>. Paste the code and hit Enter. The script
          exchanges it for an access token and writes it to <code>.env</code>.
          The code is single-use and expires in ~10 minutes, so don't dawdle.</p>
        </details>

        <details>
          <summary>State (CSRF token, for verification)</summary>
          <div class="code-box" style="margin-top: 8px">${esc(state || '(none provided)')}</div>
          <p>The script generated this random value and TikTok echoed it back.
          If it doesn't match what's in your terminal, abort — the redirect may
          have been tampered with.</p>
        </details>

        <div class="footer">passivepoly.com · oauth callback</div>
      `;

      document.getElementById('copy').addEventListener('click', async () => {
        const btn = document.getElementById('copy');
        try {
          await navigator.clipboard.writeText(code);
          btn.textContent = '✓ Copied';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy code';
            btn.classList.remove('copied');
          }, 2000);
        } catch (e) {
          alert('Clipboard write failed — manually select and copy the code above.');
        }
      });
    })();
  </script>
</body>
</html>
